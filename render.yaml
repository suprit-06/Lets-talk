services:
  - type: web
    name: lets-talk-backend
    runtime: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lets-talk-db
          property: connectionString
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_BASE
        value: https://api.groq.com/openai/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: llama3-8b-8192
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

databases:
  - name: lets-talk-db
    plan: free
    region: ohio
